<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>方向 A · 食欲红</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap');
:root{
  --primary:#DC2626; --primary-deep:#B91C1C; --cta:#CA8A04; --cta-soft:#FEF3C7;
  --bg:#FEF6F4; --surface:#FFFFFF; --ink:#450A0A; --ink-soft:#7C2D12; --muted:#A8847C;
  --line:#F5DDD6; --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Karla,system-ui,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);padding-bottom:90px}
.serif{font-family:"Playfair Display",Georgia,"Songti SC",serif}
header{padding:28px 20px 6px}
header .brand{font-size:15px;font-weight:700;letter-spacing:.14em;color:var(--primary);text-transform:uppercase}
header h1{font-size:34px;line-height:1.15;margin-top:10px;font-weight:600}
header p{margin-top:6px;color:var(--ink-soft);font-size:14px}
.search{margin:18px 20px 0;display:flex;gap:10px}
.search .box{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:13px 18px;color:var(--muted);font-size:14px;box-shadow:0 2px 10px rgba(220,38,38,.05)}
.search .add{width:48px;height:48px;border-radius:999px;background:var(--cta);display:grid;place-items:center;box-shadow:0 6px 16px rgba(202,138,4,.35)}
.section-label{display:flex;justify-content:space-between;align-items:baseline;margin:30px 20px 12px}
.section-label h2{font-size:20px;font-weight:600}
.section-label a{font-size:13px;color:var(--primary);font-weight:600;text-decoration:none}
.lists{display:flex;gap:12px;overflow-x:auto;padding:2px 20px 8px}
.list-card{min-width:150px;background:var(--surface);border-radius:var(--radius);padding:16px;border:1.5px solid var(--line)}
.list-card.hot{background:linear-gradient(135deg,#DC2626,#9F1239);color:#fff;border:none}
.list-card .count{font-size:26px;font-weight:700}
.list-card .name{font-size:13px;margin-top:2px;opacity:.85}
.list-card .meta{margin-top:14px;font-size:11px;opacity:.7}
.place{margin:0 20px 16px;background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--line);box-shadow:0 4px 18px rgba(69,10,10,.06)}
.place .photo{height:170px;background:url('https://images.unsplash.com/photo-1563245372-f21724e3856d?w=800&q=70') center/cover, linear-gradient(120deg,#F5C6B8,#E8A18C)}
.place .photo-inner{height:100%;display:flex;align-items:flex-end;padding:12px;background:linear-gradient(to top,rgba(69,10,10,.55),transparent 55%)}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700}
.chip.want{background:var(--cta-soft);color:#854D0E}
.chip.on-photo{background:rgba(255,255,255,.92);color:var(--ink)}
.place .body{padding:16px 18px 18px}
.place h3{font-size:21px;font-weight:600}
.place .sub{margin-top:3px;color:var(--muted);font-size:13px;display:flex;gap:8px;align-items:center}
.tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:12px;color:var(--primary-deep);background:#FEE8E5;border-radius:8px;padding:4px 10px;font-weight:600}
.quote{margin-top:13px;padding:11px 14px;background:var(--bg);border-left:3px solid var(--cta);border-radius:0 12px 12px 0;font-size:13.5px;color:var(--ink-soft);font-style:italic}
.signal{margin-top:13px;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.signal .heart{color:var(--primary);font-weight:700}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1.5px solid var(--line);display:flex;justify-content:space-around;padding:10px 0 22px}
nav .item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--muted);font-weight:600}
nav .item.active{color:var(--primary)}
nav svg{width:23px;height:23px}
</style>
</head>
<body>
<header>
  <div class="brand">BITE</div>
  <h1 class="serif">今晚，<em>吃点好的</em></h1>
  <p>3 个清单 · 24 家店在等你</p>
</header>
<div class="search">
  <div class="box">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    搜店名、菜系、标签…
  </div>
  <div class="add"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg></div>
</div>

<div class="section-label"><h2 class="serif">我的清单</h2><a href="#">全部 ›</a></div>
<div class="lists">
  <div class="list-card hot"><div class="count">12</div><div class="name">Irvine 想吃的</div><div class="meta">昨天更新</div></div>
  <div class="list-card"><div class="count">8</div><div class="name">罗兰岗暴走</div><div class="meta">3 天前</div></div>
  <div class="list-card"><div class="count">4</div><div class="name">和宝贝的约会清单</div><div class="meta">共享 · 2 人</div></div>
</div>

<div class="section-label"><h2 class="serif">最近添加</h2></div>
<div class="place">
  <div class="photo"><div class="photo-inner"><span class="chip on-photo">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="#CA8A04"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.3 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
    想去</span></div></div>
  <div class="body">
    <h3 class="serif">上水小馆</h3>
    <div class="sub">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Irvine · 粤菜 · $$
    </div>
    <div class="tags"><span class="tag">分量大</span><span class="tag">炒饭一绝</span><span class="tag">小红书</span></div>
    <div class="quote">"炒饭烧鸭都好吃，没吃完打包" —— 你写的理由</div>
  </div>
</div>
<div class="place">
  <div class="body" style="padding-top:18px">
    <h3 class="serif">鼎泰丰 <span style="font-size:12px;color:var(--muted);font-weight:600">Spectrum</span></h3>
    <div class="sub">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Irvine Spectrum · 台菜 · $$$
    </div>
    <div class="signal"><span class="heart">去过 2 次</span>· 上周 · ★★★★☆ · 和女朋友</div>
    <div class="quote">"麻酱小面好吃，芋泥小笼包偏腻；周五等位 4h" —— AI 备注</div>
  </div>
</div>

<nav>
  <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>清单</div>
  <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg>添加</div>
  <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 1 1-4-6.9L21 4l-1 4.5A8 8 0 0 1 21 12z"/></svg>聊天</div>
  <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>地图</div>
  <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></svg>我的</div>
</nav>
</body>
</html>
